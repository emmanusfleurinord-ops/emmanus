
</html><!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redimensionador de Imagem</title>
    <style>
        /* Estilos para centralizar e estilizar os elementos */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #imagePreview {
            margin-top: 20px;
            max-width: 100%;
            border: 1px solid #ddd;
        }
        input[type="file"], input[type="number"] {
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Redimensionador de Imagem</h1>

    <!-- Formulário para upload da imagem -->
    <input type="file" id="fileInput" accept="image/*">
    
    <div>
        <!-- Campos para definir a largura e altura -->
        <label for="widthInput">Largura: </label>
        <input type="number" id="widthInput" placeholder="Largura" min="1" disabled>
        
        <label for="heightInput">Altura: </label>
        <input type="number" id="heightInput" placeholder="Altura" min="1" disabled>
    </div>
    
    <div>
        <button id="resizeButton" disabled>Redimensionar Imagem</button>
    </div>

    <!-- Área para exibir a imagem redimensionada -->
    <img id="imagePreview" src="" alt="Imagem Preview">

    <script>
        const fileInput = document.getElementById('fileInput');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const resizeButton = document.getElementById('resizeButton');
        const imagePreview = document.getElementById('imagePreview');

        // Função para carregar a imagem
        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    widthInput.disabled = false;
                    heightInput.disabled = false;
                    resizeButton.disabled = false;
                };
                reader.readAsDataURL(file);
            } else {
                alert('Por favor, selecione um arquivo de imagem.');
            }
        });

        // Função para redimensionar a imagem
        resizeButton.addEventListener('click', function() {
            const newWidth = widthInput.value;
            const newHeight = heightInput.value;
            if (newWidth && newHeight) {
                imagePreview.style.width = `${newWidth}px`;
                imagePreview.style.height = `${newHeight}px`;
            } else {
                alert('Por favor, insira valores válidos para largura e altura.');
            }
        });
    </script>

</body>
</html>
